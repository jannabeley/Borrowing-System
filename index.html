<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipment Borrowing & Monitoring System – Barangay Camp Tinio</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, onSnapshot, query, orderBy, serverTimestamp, setDoc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAObpO8dltnKAeEdTdRzy89S8il311QDCY",
    authDomain: "barangay-system-c2de8.firebaseapp.com",
    projectId: "barangay-system-c2de8",
    storageBucket: "barangay-system-c2de8.firebasestorage.app",
    messagingSenderId: "590794764667",
    appId: "1:590794764667:web:ef968fc79c7fec65a54dde",
    measurementId: "G-R3RDGSV19D"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);

  window.__db   = db;
  window.__auth = auth;

  window.__fb = {
    collection, addDoc, getDocs, doc, updateDoc, onSnapshot,
    query, orderBy, serverTimestamp, setDoc, getDoc,
    signInWithEmailAndPassword, signOut, onAuthStateChanged
  };

  onAuthStateChanged(auth, user => {
    if (user) {
      window.__isLoggedIn = true;
      showAdmin();
      showToast('✅ Welcome back, Admin!');
    } else {
      window.__isLoggedIn = false;
    }
  });

  async function seedItems() {
    const snap = await getDocs(collection(db, 'items'));
    if (snap.empty) {
      const defaults = [
        { name:'Monoblock Chairs',  icon:'chair', total:520, inUse:0, lost:0 },
        { name:'Collapsible Tents', icon:'tent',  total:6,   inUse:0, lost:0 },
        { name:'Wooden Tables',     icon:'table', total:16,  inUse:0, lost:0 },
      ];
      for (const it of defaults) {
        await addDoc(collection(db, 'items'), it);
      }
    }
  }
  seedItems();

  const reqQ = query(collection(db, 'requests'), orderBy('createdAt','desc'));
  onSnapshot(reqQ, snap => {
    window.__requests = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
    refreshAllViews();
  });

  onSnapshot(collection(db, 'items'), snap => {
    window.__items = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
    refreshAllViews();
  });

  window.__firestore = {
    async addRequest(data) {
      return await addDoc(collection(db, 'requests'), {
        ...data, status: 'Pending', lostNote: '', returnedNote: '', rejectionReason: '',
        createdAt: serverTimestamp()
      });
    },
    async updateRequest(id, data) { return await updateDoc(doc(db, 'requests', id), data); },
    async updateItem(id, data)    { return await updateDoc(doc(db, 'items', id), data); },
    async addItem(data)           { return await addDoc(collection(db, 'items'), { ...data, inUse:0, lost:0 }); },
    async login(email, password)  { return await signInWithEmailAndPassword(auth, email, password); },
    async logout()                { return await signOut(auth); }
  };
<\/script>

<style>
:root {
  /* === REFINED PHILIPPINE GOVERNMENT PALETTE === */
  --navy:        #0D2B5E;   /* deep PH government blue */
  --navy-dark:   #071A3E;   /* darkest navy */
  --navy-mid:    #1A4A9A;   /* medium blue */
  --navy-light:  #2E6DD4;   /* bright accent blue */
  --gold:        #F5A623;   /* warm gold / PH sun */
  --gold-dark:   #C8841A;   /* deep gold */
  --gold-light:  #FFD070;   /* light gold highlight */
  --green:       #1B6B35;   /* PH forest green */
  --green-light: #2E9950;   /* action green */
  --red:         #C0272D;   /* alert red */
  --orange:      #D4620E;   /* warning orange */
  --teal:        #0E7A8A;   /* teal accent */
  --bg:          #F2F5FB;   /* cool light bg */
  --bg-warm:     #FBF8F2;   /* warm card bg */

  --text:        #0F1E38;
  --text-muted:  #5A6E8A;
  --border:      #C8D6EA;
  --shadow:      0 2px 14px rgba(13,43,94,0.09);

  --approved-bg: #E6F4EC; --approved: #1B6B35;
  --pending-bg:  #FFF8E6; --pending:  #B86A00;

  --rejected-bg: #FCEAEA; --rejected: #C0272D;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ═══ HEADER ═══ */
.header {

}
.header::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.025'%3E%3Cpath d='M0 0h40v40H0V0zm40 40h40v40H40V40z'/%3E%3C/g%3E%3C/svg%3E");
}
.header-top { display: flex; align-items: center; gap: 20px; padding: 16px 32px; position: relative; }
.header-logo {

}

.header-title h1 {

  letter-spacing: 0.4px; line-height: 1.25;

}
.header-title h1 span { color: var(--gold-light); }
.header-title p { font-size: 0.85rem; opacity: 0.75; margin-top: 3px; letter-spacing: 1.5px; font-weight: 300; }
.header-badge {
  margin-left: auto; background: rgba(245,166,35,0.15); border: 1px solid rgba(245,166,35,0.4);
  color: var(--gold-light); font-size: 0.72rem; font-weight: 700; padding: 4px 12px;
  border-radius: 100px; letter-spacing: 1px; white-space: nowrap;
}

/* ═══ NAV ═══ */
nav { background: var(--navy-dark); display: flex; align-items: center; padding: 0 32px; border-top: 2.5px solid var(--gold); position: relative; z-index: 10; }
nav button {
  background: none; border: none; color: #9DB5D8;

}
nav button:hover { color: #fff; background: rgba(255,255,255,0.04); }
nav button.active { color: #fff; border-bottom-color: var(--gold); }
.nav-spacer { flex: 1; }
.nav-admin-btn {
  background: rgba(245,166,35,0.12) !important; color: var(--gold) !important;

}

/* ═══ PAGES ═══ */
.page { display: none; animation: fadeIn 0.3s ease; }

@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

/* ═══ HERO ═══ */
.hero {

}

}
.hero h2 { font-family: 'Merriweather', serif; font-size: 1.4rem; color: var(--navy); margin-bottom: 10px; }
.hero h2 span { color: var(--navy-mid); }
.hero p { color: var(--text-muted); font-size: 0.98rem; margin-bottom: 30px; }
.hero-btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 560px; margin: 0 auto; }

/* ═══ BUTTONS ═══ */
.btn {
  display: inline-flex; align-items: center; gap: 8px;

}
.btn-green { background: var(--green-light); color: #fff; }

/* ═══ HOME CARDS ═══ */
.cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding: 28px 32px; }
@media (max-width: 700px) { .cards-grid { grid-template-columns: 1fr; } }
.card { background: var(--surface); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.card h3 { font-family: 'Merriweather', serif; font-size: 1rem; color: var(--navy-mid); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }

/* ═══ EQUIPMENT VISUAL CARDS ═══ */
.inv-items { display: flex; gap: 14px; flex-wrap: wrap; }
.inv-item {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  background: linear-gradient(160deg, var(--bg) 0%, #E8EFF8 100%);
  border-radius: 10px; padding: 16px 18px; flex: 1; min-width: 90px;

}

.guide-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.guide-list li { display: flex; align-items: center; gap: 10px; font-size: 0.93rem; }
.guide-list li::before { content: '✓'; color: var(--green-light); font-weight: 900; width: 20px; flex-shrink: 0; }

/* ═══ TABLE ═══ */
table { width: 100%; border-collapse: collapse; }
th { background: var(--bg); color: var(--text-muted); font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; padding: 10px 16px; text-align: left; border-bottom: 2px solid var(--border); }

/* ═══ BADGES ═══ */

.req-id { color: var(--navy-mid); font-weight: 700; font-size: 0.82rem; }
.link-btn { background: none; border: none; color: var(--navy-mid); font-size: 0.83rem; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: background 0.15s; }

.inv-page-card { background: var(--surface); border-radius: 14px; padding: 30px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); margin-bottom: 24px; }

/* ═══ ADMIN ═══ */
.admin-nav { background: var(--navy-dark); display: flex; align-items: center; padding: 0 24px; overflow-x: auto; flex-wrap: nowrap; border-top: 2px solid rgba(245,166,35,0.3); }
.admin-nav button { background: none; border: none; color: #7A9DC0; font-family: 'Source Sans 3', sans-serif; font-size: 0.83rem; font-weight: 600; padding: 11px 14px; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; transition: all 0.2s; }
.admin-nav button:hover { color: #fff; }
.admin-nav button.active { color: #fff; border-bottom-color: var(--gold); }
.admin-nav-spacer { flex: 1; min-width: 16px; }
.admin-user { color: #7A9DC0; font-size: 0.83rem; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.admin-content { padding: 28px 32px; }
@media (max-width: 700px) { .admin-content { padding: 16px; } }

.stat-cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
@media (max-width: 900px) { .stat-cards { grid-template-columns: repeat(2,1fr); } }
.stat-card { border-radius: 12px; padding: 20px; color: #fff; display: flex; flex-direction: column; gap: 6px; box-shadow: var(--shadow); position: relative; overflow: hidden; cursor: pointer; transition: transform 0.15s; }
.stat-card:hover { transform: translateY(-2px); }
.stat-card::after { content:''; position:absolute; top:-24px; right:-24px; width:90px; height:90px; border-radius:50%; background:rgba(255,255,255,0.1); }

.stat-card .sc-num { font-family: 'Merriweather', serif; font-size: 2rem; font-weight: 900; }
.stat-card .sc-label { font-size: 0.78rem; opacity: 0.85; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.sc-blue   { background: linear-gradient(135deg, #0D3080, #1A5CC8); }
.sc-green  { background: linear-gradient(135deg, #1B6B35, #2E9950); }
.sc-orange { background: linear-gradient(135deg, #A84B00, #D4620E); }
.sc-red    { background: linear-gradient(135deg, #8B1212, #C0272D); }

.admin-grid { display: grid; grid-template-columns: 1fr 300px; gap: 24px; }
@media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.card-header h3 { font-family: 'Merriweather', serif; font-size: 0.97rem; color: var(--navy); }

.quick-actions { display: flex; flex-direction: column; gap: 10px; }
.qa-btn { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 8px; font-family: 'Source Sans 3', sans-serif; font-size: 0.92rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; }
.qa-green { background: var(--green-light); color: #fff; } .qa-green:hover { background: var(--green); }
.qa-blue  { background: var(--navy-mid);    color: #fff; } .qa-blue:hover  { background: var(--navy); }
.qa-teal  { background: var(--teal);        color: #fff; } .qa-teal:hover  { background: #0A5E6A; }

.inv-table .available { color: var(--green-light); font-weight: 700; }
.inv-table .in-use    { color: var(--navy-mid);    font-weight: 700; }
.inv-table .lost      { color: var(--red);          font-weight: 700; }

.btn-approve { background: var(--green-light); color: #fff; border: none; padding: 5px 11px; border-radius: 4px; font-size: 0.79rem; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-right: 3px; }
.btn-approve:hover { background: var(--green); }
.btn-reject  { background: var(--red);         color: #fff; border: none; padding: 5px 11px; border-radius: 4px; font-size: 0.79rem; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-right: 3px; }
.btn-reject:hover  { background: #8B1212; }
.btn-return  { background: var(--orange);      color: #fff; border: none; padding: 5px 11px; border-radius: 4px; font-size: 0.79rem; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-right: 3px; }
.btn-return:hover  { background: #A84B00; }
.btn-edit    { background: var(--navy-mid);    color: #fff; border: none; padding: 5px 11px; border-radius: 4px; font-size: 0.79rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.btn-edit:hover    { background: var(--navy); }

/* ═══ MODAL ═══ */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.52); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 14px; padding: 32px; max-width: 500px; width: 90%; box-shadow: 0 24px 64px rgba(0,0,0,0.32); animation: fadeIn 0.22s ease; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-family: 'Merriweather', serif; font-size: 1.1rem; color: var(--navy); margin-bottom: 6px; }
.modal p { color: var(--text-muted); font-size: 0.92rem; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 16px; }

.sms-notice { background: #E6EEF9; border: 1.5px solid #A8C0E0; border-radius: 8px; padding: 12px 16px; margin: 12px 0; font-size: 0.86rem; color: var(--navy-dark); font-weight: 600; display: flex; align-items: center; gap: 8px; }
.sms-notice a { color: var(--navy); font-weight: 700; }
.reject-notice { background: var(--rejected-bg); border: 1.5px solid #E8A0A0; border-radius: 8px; padding: 12px 16px; margin: 12px 0; font-size: 0.86rem; color: var(--rejected); font-weight: 600; display: flex; align-items: center; gap: 8px; }
.reject-notice a { color: var(--rejected); font-weight: 700; }
.lost-check-group { background: #FFF4E0; border: 1.5px solid #F5A623; border-radius: 8px; padding: 14px 16px; margin: 14px 0; }
.lost-check-group label { display: flex; align-items: center; gap: 10px; font-size: 0.93rem; font-weight: 700; color: #A84B00; cursor: pointer; }
.lost-check-group input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--red); cursor: pointer; }
.lost-detail { display: none; margin-top: 12px; } .lost-detail.show { display: block; }

/* ═══ TOAST & LOADING ═══ */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy-dark); color: #fff; padding: 14px 22px; border-radius: 9px; font-size: 0.92rem; font-weight: 600; z-index: 2000; display: none; box-shadow: var(--shadow-lg); border-left: 4px solid var(--gold); }
.toast.show { display: block; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
.loading-overlay { position: fixed; inset:0; background:rgba(7,26,62,0.87); z-index:3000; display:none; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
.loading-overlay.show { display:flex; }
.spinner { width:44px; height:44px; border:4px solid rgba(255,255,255,0.2); border-top-color:var(--gold); border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { color:#fff; font-size:0.93rem; font-weight:600; }

footer { background: var(--navy-dark); color: #6080A0; font-size: 0.8rem; text-align: center; padding: 16px 32px; margin-top: 40px; border-top: 2px solid rgba(245,166,35,0.2); }
footer span { color: var(--gold); }
</style>
</head>

<script>
window.__requests = []; window.__items = []; window.__isLoggedIn = false;
const allPages = ['home','borrow','inventory','login','dashboard','a-pending','a-approved','a-returned','a-lost','a-rejected','a-items','a-inventory'];

/* SVG icons per item type */
function itemSVG(icon) {
  if (icon === 'chair') return `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect x="16" y="24" width="32" height="18" rx="3" fill="#2E6DD4" opacity="0.9"/>
    <rect x="18" y="26" width="28" height="14" rx="2" fill="#5B9CF6"/>
    <rect x="22" y="14" width="20" height="12" rx="2" fill="#3A7FE8"/>
    <rect x="24" y="16" width="16" height="8" rx="1" fill="#6AABFF"/>
    <rect x="18" y="42" width="5" height="14" rx="2" fill="#1A5CC8"/>
    <rect x="41" y="42" width="5" height="14" rx="2" fill="#1A5CC8"/>
    <rect x="19" y="54" width="7" height="3" rx="1" fill="#0D3080"/>
    <rect x="38" y="54" width="7" height="3" rx="1" fill="#0D3080"/>
    <rect x="14" y="24" width="4" height="22" rx="2" fill="#1A5CC8"/>
    <rect x="46" y="24" width="4" height="22" rx="2" fill="#1A5CC8"/>
    <rect x="14" y="14" width="4" height="12" rx="2" fill="#1A5CC8"/>
    <rect x="46" y="14" width="4" height="12" rx="2" fill="#1A5CC8"/>
  </svg>`;
  if (icon === 'tent') return `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <polygon points="32,6 8,46 56,46" fill="#2E9950" opacity="0.9"/>
    <polygon points="32,6 20,46 44,46" fill="#3DBB60"/>
    <polygon points="32,6 32,46 56,46" fill="#237A3F"/>
    <rect x="8" y="44" width="48" height="4" rx="2" fill="#1B6B35"/>
    <rect x="18" y="48" width="6" height="10" rx="1" fill="#F5A623"/>
    <rect x="40" y="48" width="6" height="10" rx="1" fill="#F5A623"/>
    <rect x="6" y="56" width="10" height="3" rx="1" fill="#C8841A"/>
    <rect x="48" y="56" width="10" height="3" rx="1" fill="#C8841A"/>
    <rect x="28" y="44" width="8" height="14" rx="1" fill="#1B6B35"/>
  </svg>`;
  if (icon === 'table') return `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect x="6" y="26" width="52" height="7" rx="3" fill="#8B5E2A"/>
    <rect x="8" y="28" width="48" height="3" rx="1" fill="#C4882A" opacity="0.6"/>
    <rect x="10" y="22" width="44" height="6" rx="2" fill="#A36C2E"/>
    <rect x="14" y="33" width="5" height="20" rx="2" fill="#8B5E2A"/>
    <rect x="45" y="33" width="5" height="20" rx="2" fill="#8B5E2A"/>
    <rect x="11" y="51" width="11" height="4" rx="2" fill="#6B4420"/>

function emojiFor(icon) {
  return icon==='chair'?'🪑': icon==='tent'?'⛺': icon==='table'?'🪵': icon||'📦';
}

/* DATE HELPERS */
function todayStr() { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function addDays(s,n) { const d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function onBorrowDateChange() {
  const bEl=document.getElementById('f-date'), rEl=document.getElementById('f-return'), bv=bEl.value;
  if(bv){ rEl.min=addDays(bv,1); if(rEl.value&&rEl.value<=bv) rEl.value=''; } else rEl.min=todayStr();
}
function setDateLimits() {
  const today=todayStr(), bEl=document.getElementById('f-date'), rEl=document.getElementById('f-return');
  if(bEl){bEl.min=today;bEl.value='';}if(rEl){rEl.min=today;rEl.value='';}
}

/* REACTIVE REFRESH */
function refreshAllViews() {
  updateHomeCounters();
  const ap=document.querySelector('.page.active'); if(!ap) return;
  const id=ap.id.replace('page-','');
  if(id==='inventory')  renderInventoryPage();
  if(id==='dashboard')  renderDashboard();
  if(id==='a-pending')  renderFilteredTable('pending-table','Pending',true);
  if(id==='a-approved') renderFilteredTable('approved-table','Approved',true);
  if(id==='a-returned') renderReturnedTable();
  if(id==='a-lost')     renderLostTable();
  if(id==='a-rejected') renderRejectedTable();
  if(id==='a-items')    renderItemsTable();
  if(id==='a-inventory')renderInventoryTable();
}

/* AUTH */
async function attemptLogin() {
  const email=document.getElementById('login-user').value.trim(), pass=document.getElementById('login-pass').value, eEl=document.getElementById('login-error');
  eEl.classList.remove('show');
  if(!email||!pass){eEl.textContent='Please enter email and password.';eEl.classList.add('show');return;}
  showLoading('Authenticating with Firebase…');
  try {
    await window.__firestore.login(email,pass);
    document.getElementById('login-user').value='';document.getElementById('login-pass').value='';

/* BORROW SUBMIT */
async function submitRequest() {
  const name=document.getElementById('f-name').value.trim(), contact=document.getElementById('f-contact').value.trim(),
    equipment=document.getElementById('f-equipment').value, qty=document.getElementById('f-qty').value,
    purpose=document.getElementById('f-purpose').value.trim(), date=document.getElementById('f-date').value,
    ret=document.getElementById('f-return').value, idNum=document.getElementById('f-id').value.trim();
  if(!name||!contact||!equipment||!qty||!purpose||!date||!ret||!idNum){showToast('⚠️ Please fill in all fields.');return;}
  showLoading('Saving request to Firebase…');
  try {
    const docRef=await window.__firestore.addRequest({name,contact,item:equipment,qty:parseInt(qty),purpose,dateNeeded:date,returnDate:ret,idNum});
    const shortId='REQ-'+docRef.id.slice(-6).toUpperCase();
    await window.__firestore.updateRequest(docRef.id,{displayId:shortId});
    document.getElementById('req-id-out').textContent=shortId;
    document.getElementById('borrow-success').classList.add('show');
    ['f-name','f-contact','f-qty','f-purpose','f-date','f-return','f-id'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-equipment').value='';
    showToast('✅ Request '+shortId+' saved!');
  } catch(e){showToast('❌ Error: '+(e.message||'Could not save request.'));}
  finally{hideLoading();}
}

/* INVENTORY HELPERS */
function getAvailable(it){return Math.max(0,(it.total||0)-(it.inUse||0)-(it.lost||0));}
function getAvailBadge(it){
  const a=getAvailable(it),p=a/(it.total||1);
  if(a===0)return '<span class="badge badge-out">Out of Stock</span>';
  if(p<=0.2)return '<span class="badge badge-low">Low Stock</span>';
  return '<span class="badge badge-available">Available</span>';
}
function getBarColor(it){
  const p=getAvailable(it)/(it.total||1);
  if(p<=0)return 'var(--red)';if(p<=0.2)return 'var(--orange)';return 'var(--green-light)';
}
function updateHomeCounters() {
  const chair=window.__items.find(i=>i.name==='Monoblock Chairs');
  const tent=window.__items.find(i=>i.name==='Collapsible Tents');
  const table=window.__items.find(i=>i.name==='Wooden Tables');
  const pc=document.getElementById('pub-chairs'),pt=document.getElementById('pub-tents'),ptb=document.getElementById('pub-tables');
  if(pc&&chair)pc.textContent=getAvailable(chair);
  if(pt&&tent)pt.textContent=getAvailable(tent);
  if(ptb&&table)ptb.textContent=getAvailable(table);
}

function searchInventory() {
  const q=document.getElementById('inv-search').value.trim().toLowerCase(),el=document.getElementById('inv-search-result');

  const found=window.__items.find(it=>it.name.toLowerCase().includes(q));

  el.style.background='';el.style.borderColor='';el.classList.add('show');
  const avail=getAvailable(found),pct=Math.round((avail/(found.total||1))*100);
  el.innerHTML=`<h4>${emojiFor(found.icon)} ${found.name} — Inventory Details</h4>
    <div class="inv-detail-row"><span class="dl">Total Quantity</span><span class="dv">${found.total}</span></div>
    <div class="inv-detail-row"><span class="dl">Currently Available</span><span class="dv">${avail} (${pct}%)</span></div>
    <div class="inv-detail-row"><span class="dl">Currently In Use</span><span class="dv">${found.inUse||0}</span></div>
    <div class="inv-detail-row"><span class="dl">Lost / Damaged</span><span class="dv">${found.lost||0}</span></div>
    <div class="inv-detail-row"><span class="dl">Status</span><span class="dv">${avail===0?'❌ Out of Stock':avail<=(found.total||1)*0.2?'⚠️ Low Stock':'✅ In Stock'}</span></div>`;

/* ADMIN ACTIONS */
function approveReq(id) {
  const r=window.__requests.find(x=>x._id===id);if(!r)return;
  const smsText=encodeURIComponent(`[Barangay Camp Tinio] Your request ${r.displayId||id} for ${r.qty} ${r.item} has been APPROVED. Date Needed: ${r.dateNeeded}. Return by: ${r.returnDate}. Thank you!`);
  document.getElementById('modal-title').textContent='Approve Request – '+(r.displayId||id);
  document.getElementById('modal-body').textContent='Confirm approval for: '+r.name+' ('+r.item+' x'+r.qty+')';
  document.getElementById('modal-form').innerHTML=
    `<div class="sms-notice">📱 <span>Notify borrower at <strong>${r.contact}</strong>:<br>
      <a href="sms:${r.contact}?body=${smsText}" onclick="showToast('📨 SMS app opened')">📤 Tap to send SMS to ${r.contact}</a></span></div>`;
  resetConfirmBtn('✅ Confirm Approve', async()=>{
    showLoading('Updating Firebase…');
    try{
      await window.__firestore.updateRequest(id,{status:'Approved'});
      const itemDoc=window.__items.find(i=>i.name===r.item);
      if(itemDoc)await window.__firestore.updateItem(itemDoc._id,{inUse:(itemDoc.inUse||0)+r.qty});
      showToast('✅ '+(r.displayId||id)+' approved!');
    }catch(e){showToast('❌ Error: '+e.message);}
    finally{hideLoading();closeModal();}
  });
  document.getElementById('modal').classList.add('show');
}

function rejectReq(id) {
  const r=window.__requests.find(x=>x._id===id);if(!r)return;
  const smsBody=encodeURIComponent(`[Barangay Camp Tinio] Your equipment request (${r.displayId||id}) for ${r.qty} ${r.item} has been REJECTED. Please contact the barangay hall for more information.`);
  document.getElementById('modal-title').textContent='❌ Reject Request – '+(r.displayId||id);
  document.getElementById('modal-body').textContent='You are about to reject '+r.name+"'s request for "+r.qty+' '+r.item+'.';
  document.getElementById('modal-form').innerHTML=`
    <div class="form-group">
      <label style="color:var(--red);">Reason for Rejection (required)</label>
      <textarea id="reject-reason-input" rows="3" placeholder="e.g. Item unavailable on requested date…" style="width:100%;border:1.5px solid var(--border);border-radius:7px;padding:10px 14px;font-family:inherit;font-size:0.93rem;resize:vertical;outline:none;"></textarea>
    </div>
    <div class="reject-notice">📱 <span>Notify at <strong>${r.contact}</strong>:<br>
      <a href="sms:${r.contact}?body=${smsBody}" onclick="showToast('📨 SMS app opened')">📤 Tap to notify ${r.contact}</a></span></div>`;
  const confirmBtn=document.getElementById('modal-confirm');
  confirmBtn.textContent='❌ Confirm Rejection';confirmBtn.style.background='var(--red)';confirmBtn.style.color='#fff';confirmBtn.style.borderColor='var(--red)';
  confirmBtn.onclick=async()=>{
    const reason=document.getElementById('reject-reason-input').value.trim();
    if(!reason){showToast('⚠️ Please enter a reason.');return;}
    showLoading('Updating Firebase…');
    try{await window.__firestore.updateRequest(id,{status:'Rejected',rejectionReason:reason});showToast('❌ '+(r.displayId||id)+' rejected.');}
    catch(e){showToast('❌ Error: '+e.message);}finally{hideLoading();closeModal();}
  };
  document.getElementById('modal').classList.add('show');
}

function openReturnModal(id) {
  const r=window.__requests.find(x=>x._id===id);if(!r)return;
  document.getElementById('modal-title').textContent='Mark as Returned – '+(r.displayId||id);
  document.getElementById('modal-body').textContent=r.name+' returning '+r.qty+' '+r.item;
  document.getElementById('modal-form').innerHTML=`
    <div class="form-group"><label>Return Notes (optional)</label><input type="text" id="return-note-input" placeholder="e.g. All items complete, good condition"></div>
    <div class="lost-check-group">
      <label><input type="checkbox" id="lost-check" onchange="toggleLostDetail()">⚠️ Some items are Lost or Damaged</label>
      <div class="lost-detail" id="lost-detail">
        <div class="form-group" style="margin-top:10px;margin-bottom:0;"><label style="color:var(--red);">Describe the Lost/Damaged Items</label><input type="text" id="lost-note-input" placeholder="e.g. 2 chairs broken, 1 tent missing"></div>
        <div class="sms-notice" style="margin-top:10px;">📱 <span>Notify at <strong>${r.contact}</strong>:<br>
          <a href="sms:${r.contact}?body=${encodeURIComponent('[Barangay Camp Tinio] Your borrowing of '+r.item+' ('+r.displayId+') has LOST/DAMAGED items. Please contact barangay hall immediately.')}" onclick="showToast('📨 SMS app opened')">📤 Tap to notify ${r.contact}</a></span></div>
      </div>
    </div>`;
  resetConfirmBtn('📦 Confirm Return', async()=>{
    const hasLost=document.getElementById('lost-check').checked;
    const retNote=document.getElementById('return-note-input').value.trim();
    const lostNote=hasLost?(document.getElementById('lost-note-input').value.trim()||'Damage reported'):'';
    showLoading('Updating Firebase…');
    try{
      const newStatus=hasLost?'Lost/Damaged':'Returned';
      await window.__firestore.updateRequest(id,{status:newStatus,returnedNote:retNote||'All items returned',lostNote});
      const itemDoc=window.__items.find(i=>i.name===r.item);
      if(itemDoc){
        const newInUse=Math.max(0,(itemDoc.inUse||0)-r.qty);
        const newLost=hasLost?(itemDoc.lost||0)+r.qty:(itemDoc.lost||0);
        await window.__firestore.updateItem(itemDoc._id,{inUse:newInUse,lost:newLost});
      }
      showToast(hasLost?'⚠️ Marked as Lost/Damaged!':'📦 Marked as Returned!');
    }catch(e){showToast('❌ Error: '+e.message);}finally{hideLoading();closeModal();}
  });
  document.getElementById('modal').classList.add('show');
}

function toggleLostDetail(){const cb=document.getElementById('lost-check'),d=document.getElementById('lost-detail');if(d)d.classList.toggle('show',cb.checked);}

function editItem(itemId) {
  const it=window.__items.find(i=>i._id===itemId);if(!it)return;
  document.getElementById('modal-title').textContent='Edit: '+it.name;
  document.getElementById('modal-body').textContent='Update inventory numbers. Changes saved to Firebase.';
  document.getElementById('modal-form').innerHTML=`
    <div class="form-group"><label>Total Quantity</label><input type="number" id="edit-total" value="${it.total}" min="0"></div>
    <div class="form-group"><label>In Use</label><input type="number" id="edit-inuse" value="${it.inUse||0}" min="0"></div>
    <div class="form-group"><label>Lost/Damaged</label><input type="number" id="edit-lost" value="${it.lost||0}" min="0"></div>`;
  resetConfirmBtn('💾 Save to Firebase', async()=>{
    const total=parseInt(document.getElementById('edit-total').value)||0;
    const inUse=parseInt(document.getElementById('edit-inuse').value)||0;
    const lost=parseInt(document.getElementById('edit-lost').value)||0;
    showLoading('Saving to Firebase…');
    try{await window.__firestore.updateItem(itemId,{total,inUse,lost});showToast('✅ Item updated!');}
    catch(e){showToast('❌ Error: '+e.message);}finally{hideLoading();closeModal();}
  });
  document.getElementById('modal').classList.add('show');
}

function showAddItem() {
  document.getElementById('modal-title').textContent='Add New Item';
  document.getElementById('modal-body').textContent='New item will be saved to Firebase Firestore.';
  document.getElementById('modal-form').innerHTML=`
    <div class="form-group"><label>Item Name</label><input type="text" id="add-name" placeholder="e.g. Sound System"></div>
    <div class="form-group"><label>Icon type (chair/tent/table or emoji)</label><input type="text" id="add-icon" placeholder="chair" maxlength="10" value="📦"></div>
    <div class="form-group"><label>Total Quantity</label><input type="number" id="add-total" placeholder="0" min="0"></div>`;
  resetConfirmBtn('➕ Add to Firebase', async()=>{
    const name=document.getElementById('add-name').value.trim(),icon=document.getElementById('add-icon').value.trim()||'📦',total=parseInt(document.getElementById('add-total').value)||0;
    if(!name){showToast('⚠️ Please enter item name.');return;}
    showLoading('Adding item to Firebase…');
    try{await window.__firestore.addItem({name,icon,total});showToast('✅ Item added: '+name);closeModal();}
    catch(e){showToast('❌ Error: '+e.message);}finally{hideLoading();}
  });
  document.getElementById('modal').classList.add('show');
}

/* MODAL UTILS */
function resetConfirmBtn(label,handler){
  const btn=document.getElementById('modal-confirm');
  btn.textContent=label;btn.style.background='';btn.style.color='';btn.style.borderColor='';btn.onclick=handler;
}
function closeModal(){document.getElementById('modal').classList.remove('show');resetConfirmBtn('Save',()=>closeModal());}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

/* LOADING / TOAST / BADGE */
function showLoading(msg){document.getElementById('loading-text').textContent=msg||'Saving…';document.getElementById('loading-overlay').classList.add('show');}
function hideLoading(){document.getElementById('loading-overlay').classList.remove('show');}
function badgeClass(s){return {'Approved':'badge-approved','Pending':'badge-pending','Returned':'badge-returned','Lost/Damaged':'badge-lost','Rejected':'badge-rejected'}[s]||'badge-pending';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}

setDateLimits();
<\/script>
</body>
</html>
